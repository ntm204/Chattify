version: '3.8'

services:
  # PostgreSQL (Primary Database)
  postgres:
    image: postgres:15-alpine
    container_name: chatiffy_postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: chatiffy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chatiffy_network

  # PgAdmin (PostgreSQL UI)
  pgadmin:
    image: dpage/pgadmin4
    container_name: chatiffy_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@chatiffy.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - chatiffy_network

  # MongoDB (Message Store)
  mongodb:
    image: mongo:6-jammy
    container_name: chatiffy_mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - chatiffy_network

  # Mongo Express (MongoDB UI)
  mongo-express:
    image: mongo-express
    container_name: chatiffy_mongo_express
    restart: always
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: rootpassword
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
    networks:
      - chatiffy_network

  # Redis (Cache & Pub/Sub)
  redis:
    image: redis:7-alpine
    container_name: chatiffy_redis
    restart: always
    command: redis-server --requirepass rootpassword
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - chatiffy_network

volumes:
  postgres_data:
  mongodb_data:
  redis_data:

networks:
  chatiffy_network:
    driver: bridge
